apiVersion: apps/v1
kind: Deployment
metadata:
  name: ner-service
  labels:
    app: ner-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ner-service
  template:
    metadata:
      labels:
        app: ner-service
    spec:
      containers:
      - name: ner-service
        image: docker.io/library/ner-service:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8002
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 60
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ner-service
spec:
  selector:
    app: ner-service
  ports:
  - port: 8002
    targetPort: 8002
  type: ClusterIP
