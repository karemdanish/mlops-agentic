apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-orchestrator
  labels:
    app: agentic-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentic-orchestrator
  template:
    metadata:
      labels:
        app: agentic-orchestrator
    spec:
      containers:
      - name: agentic-orchestrator
        image: docker.io/library/agentic-orchestrator:v3
        imagePullPolicy: Never
        ports:
        - containerPort: 8003
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secret
              key: OPENAI_API_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agentic-orchestrator
spec:
  selector:
    app: agentic-orchestrator
  ports:
  - port: 8003
    targetPort: 8003
  type: ClusterIP
