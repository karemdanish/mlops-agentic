apiVersion: apps/v1
kind: Deployment
metadata:
  name: baseline-orchestrator
  labels:
    app: baseline-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: baseline-orchestrator
  template:
    metadata:
      labels:
        app: baseline-orchestrator
    spec:
      containers:
      - name: baseline-orchestrator
        image: docker.io/library/baseline-orchestrator:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8003
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: baseline-orchestrator
spec:
  selector:
    app: baseline-orchestrator
  ports:
  - port: 8003
    targetPort: 8003
  type: ClusterIP
